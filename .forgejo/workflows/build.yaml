name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    # We tell the runner to use the Kaniko image for this specific job.
    # Forgejo will handle mounting Node into it so the 'steps' work.
    runs-on: docker
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and Push with Kaniko Action
        # The 'docker://' prefix tells Forgejo to run this step INSIDE that container
        uses: docker://gcr.io/kaniko-project/executor:debug
        with:
          # We pass arguments directly to the entrypoint
          args: >-
            --context=dir://${{ github.workspace }}
            --dockerfile=${{ github.workspace }}/Dockerfile
            --destination=git.example.com/${{ github.repository_owner }}/my-app:latest
        env:
          # Kaniko looks for this env var for its config
          CANIKO_DOCKER_CONFIG: |
            {
              "auths": {
                "git.example.com": {
                  "auth": "${{ secrets.GITHUB_TOKEN_BASE64 }}"
                }
              }
            }

