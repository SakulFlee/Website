name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    # We tell the runner to use the Kaniko image for this specific job.
    # Forgejo will handle mounting Node into it so the 'steps' work.
    runs-on: docker
    container:
      image: gcr.io/kaniko-project/executor:debug
      # We need to run as root inside the container to build the image
      options: --user 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and Push
        run: |
          # 1. Create the Docker auth config
          # $GITHUB_DATA_HOME is usually where the runner stores metadata
          mkdir -p /kaniko/.docker
          echo "{\"auths\":{\"${{ github.server_url }}\":{\"auth\":\"$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)\"}}}" > /kaniko/.docker/config.json
          
          # 2. Run the executor (it's already in the path in this image)
          /kaniko/executor \
            --context "${{ github.workspace }}" \
            --dockerfile "${{ github.workspace }}/Dockerfile" \
            --destination "${{ github.repository_owner }}/my-docker-app:latest"
