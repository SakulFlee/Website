 I need a Forgejo actions pipeline that builds a Docker image and pushes it to the Forgejo registry. The default image to be used is "node" and has to be used for actions to work. Docker isn't available in it.

Since your Forgejo runner operates inside a default node container without access to the Docker daemon, you'll need to use a "daemonless" image building tool.

The most reliable tool for this exact scenario is Buildah. It can be installed directly into the Node environment during the pipeline execution and can build and push OCI/Docker images entirely within an unprivileged container by utilizing the Virtual File System (vfs) storage driver.

Here is the complete Forgejo Action workflow to achieve this. You can place this file in your repository at .forgejo/workflows/build-and-push.yml (or .github/workflows/build-and-push.yml, as Forgejo is compatible with both).
YAML

name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Change this if your default branch is different

env:
  # ⚠️ Replace with your Forgejo instance's domain
  REGISTRY: git.example.com 
  # The image path: usually <owner>/<image-name>
  IMAGE_NAME: ${{ github.repository_owner }}/my-docker-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest # This maps to your runner, launching the default 'node' image

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Buildah
        run: |
          # Detect if we need sudo, then install Buildah based on the underlying OS (Debian vs Alpine)
          if command -v sudo &> /dev/null; then SUDO="sudo"; else SUDO=""; fi
          
          if command -v apt-get &> /dev/null; then
            $SUDO apt-get update -y
            $SUDO apt-get install -y buildah
          elif command -v apk &> /dev/null; then
            $SUDO apk update
            $SUDO apk add buildah
          else
            echo "Unsupported package manager. Cannot install Buildah."
            exit 1
          fi

      - name: Log in to Forgejo Container Registry
        run: |
          # Securely authenticate using the automatically provided Action token
          echo "${{ secrets.GITHUB_TOKEN }}" | buildah login --username "${{ github.actor }}" --password-stdin $REGISTRY

      - name: Build the Docker image
        run: |
          # Use the 'vfs' storage driver to bypass the need for container root privileges
          # '--format docker' ensures maximum compatibility for anyone pulling the image later
          buildah build --storage-driver vfs --format docker -f Dockerfile -t $REGISTRY/$IMAGE_NAME:latest .

      - name: Push the Docker image
        run: |
          buildah push --storage-driver vfs --format docker $REGISTRY/$IMAGE_NAME:latest

Why this works:

    Runner Compatibility: Since Forgejo/Gitea uses Action runners that mount JS actions requiring Node, the workflow honors your constraint and stays within that environment.

    Dynamic Installation: The pipeline dynamically checks for apt-get (standard Node images) or apk (Alpine Node images) so it successfully installs buildah regardless of which specific Node image flavor the runner drops you into.

    The vfs workaround: The flag --storage-driver vfs is the magic piece here. Standard container builders attempt to mount overlayfs, which gets blocked in unprivileged (Docker-in-Docker without privileges) containers. vfs forces standard file-copying, allowing the image to build successfully without daemon access or special security permissions.

    Permissions: Forgejo natively populates ${{ secrets.GITHUB_TOKEN }} (aliased perfectly from GitHub Actions) with the necessary rights to push to the integrated package registry. You do not need to create a personal access token for this, as long as Packages are enabled for the repository.

