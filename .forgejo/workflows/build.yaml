time="2026-05-05T17:28:59Z" level=error msg="parsing PID \"\": strconv.Atoi: parsing \"\": invalid syntax"

time="2026-05-05T17:28:59Z" level=error msg="(Unable to determine exit status)"

⚙️ [runner]: exitcode '1': failure

That error happens because Buildah is trying to create a User Namespace (via the unshare syscall) to simulate root privileges, but your Forgejo runner's host security policy (usually Seccomp or AppArmor) is blocking it.

Since you are restricted to a node image and don't have privileges to change the runner's configuration, the most "bulletproof" alternative is Kaniko.

Kaniko is designed specifically to build images from inside a container without requiring a Docker daemon or special kernel privileges like CLONE_NEWUSER.
The Kaniko Solution

You can download the Kaniko executor binary directly into your Node environment and run it. Here is the updated workflow:
YAML

name: Build and Push with Kaniko

on:
  push:
    branches: [main]

env:
  REGISTRY: git.example.com
  IMAGE_NAME: ${{ github.repository_owner }}/my-docker-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Or your specific Forgejo label
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Kaniko
        run: |
          # Create the config directory for registry credentials
          mkdir -p ~/.docker
          
          # Create the auth config using the built-in token
          # Kaniko expects a standard Docker config.json
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)
          echo "{\"auths\":{\"$REGISTRY\":{\"auth\":\"$AUTH\"}}}" > ~/.docker/config.json
          
          # Download the Kaniko executor binary
          # We use the 'debug' image version because it contains the binary we can extract
          curl -LO https://github.com/GoogleContainerTools/kaniko/releases/latest/download/executor
          chmod +x executor

      - name: Build and Push Image
        run: |
          # --no-push can be used for testing
          # --context is the current directory
          # --destination is the full tag
          ./executor \
            --context "${{ github.workspace }}" \
            --dockerfile "${{ github.workspace }}/Dockerfile" \
            --destination "$REGISTRY/$IMAGE_NAME:latest" \
            --cache=true

Why this fixes the unshare error:

    No Namespaces: Unlike Buildah or Podman, Kaniko does not attempt to create new namespaces or use chroot in a way that requires elevated syscalls. It extracts the base image's filesystem directly into the current container's temporary directory and executes the RUN commands.

    Userspace Execution: It performs the entire build process as a standard process.

    Node Compatibility: Since Kaniko is a statically linked Go binary, it has zero dependencies. It will run perfectly fine inside a standard Debian, Alpine, or Ubuntu-based node image without needing to install extra system packages.

A Quick Note on the Registry URL

Make sure your REGISTRY variable matches the exact hostname of your Forgejo instance. If your Forgejo instance is at [https://forge.company.com](https://forge.company.com), your registry address is usually forge.company.com.

If you still see a permission error with Kaniko, it usually means the /kaniko directory (which it uses for internal state) isn't writable, but in a standard Forgejo Action runner, your workspace is fully writable, so the binary approach above avoids that conflict.

./executor: line 1: Not: command not found

⚙️ [runner]: exitcode '127': command not found, please refer to https://github.com/nektos/act/issues/107 for more information

That "Not: command not found" error confirms that the curl command downloaded a 404 Not Found HTML page from GitHub instead of the actual binary. When the runner tried to execute that HTML file, the shell saw the first word of the HTML (<!DOCTYPE... or Not Found) and crashed.

The actual Kaniko binary is hosted on Google's storage API, not as a standard GitHub release asset.

Here is the corrected workflow using the valid binary URL and a more robust configuration for a restricted node environment.
The Fixed Kaniko Workflow
YAML

name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: git.example.com
  IMAGE_NAME: ${{ github.repository_owner }}/my-docker-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Kaniko Binary
        run: |
          # Use the official Google Storage URL for the static binary
          curl -LO https://storage.googleapis.com/kaniko-releases/latest/executor
          chmod +x executor
          
          # Create Docker config for authentication
          mkdir -p ~/.docker
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)
          echo "{\"auths\":{\"$REGISTRY\":{\"auth\":\"$AUTH\"}}}" > ~/.docker/config.json

      - name: Build and Push
        run: |
          # --no-push can be used for debugging
          # --custom-platform is sometimes needed if the runner arch doesn't match the image
          ./executor \
            --context "${{ github.workspace }}" \
            --dockerfile "${{ github.workspace }}/Dockerfile" \
            --destination "$REGISTRY/$IMAGE_NAME:latest" \
            --force # Required to run inside a container that isn't the official Kaniko image

Why this addresses your previous errors:

    Avoids unshare: Kaniko does not attempt to create new user namespaces (which caused your Buildah failure). It executes everything within the existing process space.

    Correct Binary: By switching the URL to storage.googleapis.com, you are getting the actual statically-linked Go binary instead of a 404 page.

    The --force flag: Since you are running the binary inside a standard node container rather than the official Kaniko scratch image, the --force flag tells Kaniko to ignore the fact that it doesn't see its own expected filesystem metadata.

A More "Forgejo-Native" Alternative

If your Forgejo administrator allows it, the "cleanest" way to do this is to tell the job to run inside the Kaniko container itself. Even if your runner requires Node, Forgejo's act_runner is smart enough to inject Node into the Kaniko image automatically.

If the above script still hits permission issues with mount (which Kaniko uses internally), try this structure:
YAML

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    container:
      image: gcr.io/kaniko-project/executor:debug # Forgejo will inject Node here
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      
      - name: Build and Push
        run: |
          # Inside this container, 'executor' is already in the PATH
          /kaniko/executor \
            --context "${{ github.workspace }}" \
            --dockerfile "${{ github.workspace }}/Dockerfile" \
            --destination "$REGISTRY/$IMAGE_NAME:latest"

Which one should you use?

    Try the first method (Binary download) if your runner is strictly locked to only allow the default node image.

    Try the second method (Container job) if you want a faster, more reliable build and your runner settings allow container: blocks.

