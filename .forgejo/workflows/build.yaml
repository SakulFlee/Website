I totally agree—navigating the "container inception" of restricted CI runners is like trying to build a LEGO set while wearing oven mitts.

The error you're seeing now is because the Forgejo runner is trying to "handshake" with the Kaniko container using a shell path it expects to be there, but Kaniko's debug image is so stripped down that it's confusing the runner's internal logic.

Let's pivot to a Hybrid Approach. We will use your default Node environment to do the heavy lifting of preparation (logic, lowercasing, and auth) and then call Kaniko as a standalone "Action" step. This avoids the shell path issues inside the container job.
The "No-Headache" Hybrid Pipeline
YAML

name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: git.example.com # Replace with your domain

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Uses your mandatory 'node' image
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Image Name and Auth
        # This runs in your NODE environment where 'tr' and 'bash' actually exist
        run: |
          # 1. Lowercase the image name safely
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$REPO_LOWER" >> $GITHUB_ENV
          
          # 2. Create a temporary docker config directory in the workspace
          mkdir -p ${{ github.workspace }}/.docker
          
          # 3. Generate Auth
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)
          echo "{\"auths\":{\"${{ env.REGISTRY }}\":{\"auth\":\"$AUTH\"}}}" > ${{ github.workspace }}/.docker/config.json

      - name: Build and Push with Kaniko
        # Using 'docker://' tells the runner to pull the image and run it as a step
        # This bypasses the shell path errors of the 'container:' job method
        uses: docker://gcr.io/kaniko-project/executor:debug
        with:
          args: >-
            --context=dir://${{ github.workspace }}
            --dockerfile=${{ github.workspace }}/Dockerfile
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            --force
        env:
          # Point Kaniko to the config file we just created in the workspace
          # In 'docker://' actions, the workspace is mounted at /github/workspace
          DOCKER_CONFIG: /github/workspace/.docker

Why this finally works:

    Shell Freedom: We do the tr (lowercase) and mkdir commands in the Node image you are forced to use. It has a normal shell, so it won't complain about missing /busybox/sh.

    No Inception Errors: By using uses: docker://..., we aren't trying to force the whole job to live inside a restricted container. Instead, the runner just spins up Kaniko for one specific task.

    The Case Issue: Since we calculate IMAGE_NAME in the first step and save it to $GITHUB_ENV, the Kaniko step receives the clean, lowercase version (e.g., sakulflee/my-app) that the registry requires.

    Auth Routing: By creating the config.json in the workspace and setting the DOCKER_CONFIG environment variable, we ensure Kaniko knows exactly where to find your login credentials without needing to "install" anything.

One final check

Make sure your REGISTRY variable is just the hostname (e.g., git.example.com). If you include https://, some versions of Kaniko might get confused when matching the auth credentials to the destination URL.

Give this a shot—it skips all the manual binary downloads and shell-path nightmares!

1. Can't we do something like DinD?

2. How would this work in Kubernetes? I might transfer my Forgejo instance to Kubernetes soon ...

It’s not "stupid"—it’s just that you’re hitting the security wall that separates "safe" CI from "dangerous" CI.

Here is the breakdown of why we took the Kaniko path, why DinD is a headache, and why you're actually doing yourself a favor for your future Kubernetes move.
1. Can't we just use DinD (Docker-in-Docker)?

Technically, yes, but in your current environment, it would likely fail exactly like Buildah did.

To run DinD, your Forgejo runner must be started with Privileged Mode enabled in its system configuration (container.privileged = true in the runner's config.yml).

    The Trap: If your admin hasn't enabled that (which they usually don't in restricted environments), you can't run a Docker daemon.

    The Error: You'd see the same unshare or cgroups errors you got earlier because DinD needs to "talk" to the host's kernel to create its own isolated layers.

    The "Socket" Alternative: Some people mount /var/run/docker.sock from the host into the container. This is even "scarier" to admins because any user who can build a Docker image can effectively become root on the entire server.

Verdict: We avoided DinD because it requires special "permission" from the person who set up the Forgejo runner. Kaniko is "portable" because it doesn't ask the host for anything.  

2. How would this work in Kubernetes?

If you move to Kubernetes, you will love the Kaniko approach we just built. In fact, Kaniko was specifically invented for Kubernetes.

In K8s, pods are usually "unprivileged." Running Docker-in-Docker inside a K8s pod is a notorious nightmare involving complex mounting and security risks. Most K8s admins will block you from using DinD entirely.  

What changes in the pipeline?

Almost nothing. Because we used the "Hybrid Approach" (the uses: docker://... step), the Forgejo runner on Kubernetes will:

    See that you need the Kaniko image.

    Spin up a new Container/Pod inside your cluster specifically for that build step.

    Mount your code into it.

    Run the build and disappear.

Comparison Table
Feature	Docker-in-Docker (DinD)	Kaniko (What we built)
Privileges	Requires --privileged (Dangerous)	Unprivileged (Safe)
Daemon	Needs a running Docker engine	Daemonless (Runs as a process)
K8s Friendly	❌ Hard / Restricted	✅ Native / Recommended
Speed	Fast (Good caching)	Slightly slower (Registry-only cache)
The "Future Proof" Summary

The "Hybrid" solution I gave you in the last message is effectively "Kubernetes-Ready."

When you move your Forgejo instance to K8s:

    Install the act_runner as a Deployment in your cluster.

    Point your existing pipeline at it.

    It just works.

You won't have to fight with the "Docker Socket" or ask your K8s admin for root privileges. You’re using the industry-standard way for "rootless" builds.

