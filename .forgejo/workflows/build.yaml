Well then let's get Kamiko working

All right, let's get Kaniko (often typoed as Kamiko, but it's the same tool) over the finish line.

Since your runner is struggling with /busybox/sh inside the container: block, we’re going to use the Hybrid Approach. This is the most resilient method: it does the logic (lowercasing and auth) in your reliable Node environment and then hands the "heavy lifting" of the build to a standalone Kaniko container.
The Final, Working Pipeline
YAML

name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  # ⚠️ Replace with your Forgejo domain (e.g., git.example.com)
  REGISTRY: forge.example.com 

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Your default Node-based runner
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Image Name and Auth
        # This runs in the NODE environment where 'bash' and 'tr' exist.
        run: |
          # 1. Lowercase the repo name (SakulFlee/my-app -> sakulflee/my-app)
          # Forgejo's registry requires lowercase names.
          IMAGE_PATH=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_PATH" >> $GITHUB_ENV
          
          # 2. Create a docker config directory in the workspace
          # We use the workspace because it's shared with the next step.
          mkdir -p ${{ github.workspace }}/.docker
          
          # 3. Generate Auth JSON
          # We strip "https://" from the registry name for the auth key.
          REG_HOST=$(echo "${{ env.REGISTRY }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)
          
          echo "{\"auths\":{\"$REG_HOST\":{\"auth\":\"$AUTH\"}}}" > ${{ github.workspace }}/.docker/config.json

      - name: Build and Push with Kaniko
        # This syntax tells the runner: "Pull this image and run it as a tool"
        # It bypasses the shell path errors of the previous method.
        uses: docker://gcr.io/kaniko-project/executor:debug
        with:
          args: >-
            --context=/github/workspace
            --dockerfile=/github/workspace/Dockerfile
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            --force
        env:
          # Tell Kaniko to look in our workspace for the login credentials
          DOCKER_CONFIG: /github/workspace/.docker

Why this fixes the specific errors you had:

    The "SakulFlee" Case Error: The tr '[:upper:]' '[:lower:]' command in the first step takes your capitalized username and makes it registry-compliant before Kaniko ever sees it.

    The /busybox/sh Error: By using uses: docker://... instead of a container: block, the runner doesn't try to "log in" to the container to run a script. It simply starts the container with the args we provided.

    The "No Permission" / "No Daemon" Error: Kaniko performs the build in userspace. It doesn't ask the kernel for permission to create namespaces, so it won't trigger the Operation not permitted error you saw with Buildah.

2026/Kubernetes Context

Since you mentioned moving to Kubernetes:

    This exact pipeline is K8s-ready. When you switch, the only thing that changes is where the act_runner lives.

    In K8s, the runner will see uses: docker://... and spin up a new Pod specifically for Kaniko.

    Because Kaniko doesn't need "Privileged Mode," your K8s admin won't have to open any security holes for you.

