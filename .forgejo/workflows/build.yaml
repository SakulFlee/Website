name: Build and Push with Buildah

on:
  push:
    branches: [main]

env:
  REGISTRY: forge.example.com
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Lowercase Image Name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push using Buildah
        uses: docker://quay.io/buildah/stable:latest
        with:
          entrypoint: /bin/sh
          args: |
            -c "
            # 1. Log in to the registry
            buildah login --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
            
            # 2. Build the image
            # --storage-driver vfs: Avoids needing special filesystem permissions
            # --isolation chroot: Avoids the 'unshare' syscall that failed earlier
            buildah build \
              --storage-driver vfs \
              --isolation chroot \
              --format docker \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest .
            
            # 3. Push the image
            buildah push \
              --storage-driver vfs \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
            "
        env:
          # This helps Buildah realize it's in a restricted environment
          BUILDAH_ISOLATION: chroot
