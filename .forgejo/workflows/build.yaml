I hear you—it’s incredibly frustrating when a "simple" task like building an image turns into a fight with kernel permissions and dead download links. The "binary download" method failed because Google changed their storage bucket paths, and Buildah failed because your runner is locked down.

Since you're in a restricted node environment but need to build an image, let's skip the manual binary hacks and use the Container-in-Job approach.
The "Proper" Way: Job Containers

Even if your runner defaults to node, Forgejo's runner (act_runner) is designed to swap images for specific jobs. It automatically injects the required Node.js binaries into whatever image you choose so that the actions still function.

Using the official Kaniko image directly as the environment for your job is the most stable method.
YAML

name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    # We tell the runner to use the Kaniko image for this specific job.
    # Forgejo will handle mounting Node into it so the 'steps' work.
    runs-on: ubuntu-latest
    container:
      image: gcr.io/kaniko-project/executor:debug
      # We need to run as root inside the container to build the image
      options: --user 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and Push
        run: |
          # 1. Create the Docker auth config
          # $GITHUB_DATA_HOME is usually where the runner stores metadata
          mkdir -p /kaniko/.docker
          echo "{\"auths\":{\"${{ github.server_url }}\":{\"auth\":\"$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)\"}}}" > /kaniko/.docker/config.json
          
          # 2. Run the executor (it's already in the path in this image)
          /kaniko/executor \
            --context "${{ github.workspace }}" \
            --dockerfile "${{ github.workspace }}/Dockerfile" \
            --destination "${{ github.repository_owner }}/my-docker-app:latest"

If you are FORCED to stay in the Node image

If your admin has locked the runner so you cannot use the container: block, there is one last "Action-native" way. You can call the Kaniko image as a standalone step. The runner will pull the image and run it alongside your node environment.
YAML

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and Push with Kaniko Action
        # The 'docker://' prefix tells Forgejo to run this step INSIDE that container
        uses: docker://gcr.io/kaniko-project/executor:debug
        with:
          # We pass arguments directly to the entrypoint
          args: >-
            --context=dir://${{ github.workspace }}
            --dockerfile=${{ github.workspace }}/Dockerfile
            --destination=git.example.com/${{ github.repository_owner }}/my-app:latest
        env:
          # Kaniko looks for this env var for its config
          CANIKO_DOCKER_CONFIG: |
            {
              "auths": {
                "git.example.com": {
                  "auth": "${{ secrets.GITHUB_TOKEN_BASE64 }}"
                }
              }
            }

Why this is better:

    No unshare errors: Kaniko is built to run in "unprivileged" environments (like Kubernetes or restricted runners) without needing the CLONE_NEWUSER syscall that broke Buildah.

    No 404/Download errors: You aren't downloading a binary via curl; the runner pulls the official, verified image from Google's registry.

    Clean environment: You don't have to worry about whether the node image is Alpine or Debian or if it has sudo.

One small tip: If you use the second method, you'll need to create a secret or a variable called GITHUB_TOKEN_BASE64 because Kaniko's JSON config requires the username:password string to be pre-encoded in base64.

Which of these fits your runner's permissions better? If your runner allows container:, use the first one—it's much cleaner.

Seems to almost work, but tue repository name is upper case ...

error checking push permissions -- make sure you entered the correct tag name, and that you are authenticated correctly, and try again: getting tag for destination: repository can only contain the characters `abcdefghijklmnopqrstuvwxyz0123456789_-./`: SakulFlee/my-app

⚙️ [runner]: exit with `FAILURE`: 1

It is a classic "gotcha" in the Docker world: Docker registries strictly forbid uppercase letters in image names, but Forgejo (and GitHub) usernames are often capitalized.

Since we can't change your username, we have to lowercase the string inside the pipeline before passing it to Kaniko.

Here is the corrected workflow. It includes a specific step to lowercase your repository name and save it as an environment variable.
The Fixed "Lowercased" Pipeline
YAML

name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: git.example.com # Replace with your Forgejo domain

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    container:
      image: gcr.io/kaniko-project/executor:debug
      options: --user 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Image Name and Auth
        shell: /busybox/sh # Kaniko uses busybox
        run: |
          # 1. Lowercase the repository name (e.g., SakulFlee/my-app -> sakulflee/my-app)
          # We use 'tr' for compatibility across all shell types
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$REPO_LOWER" >> $GITHUB_ENV
          
          # 2. Prepare authentication
          mkdir -p /kaniko/.docker
          # Forgejo often needs the protocol-less domain for the auth key
          REGISTRY_DOMAIN=$(echo "${{ env.REGISTRY }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)
          echo "{\"auths\":{\"$REGISTRY_DOMAIN\":{\"auth\":\"$AUTH\"}}}" > /kaniko/.docker/config.json

      - name: Build and Push
        run: |
          # Now we use the $IMAGE_NAME env variable we created in the previous step
          /kaniko/executor \
            --context "${{ github.workspace }}" \
            --dockerfile "${{ github.workspace }}/Dockerfile" \
            --destination "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            --force

What changed?

    The tr command: We used echo ... | tr '[:upper:]' '[:lower:]' to transform SakulFlee into sakulflee.

    $GITHUB_ENV: We saved that lowercased name into the environment so the next step can see it.

    Shell Override: I added shell: /busybox/sh to the prepare step. Because you are running inside the Kaniko image, standard /bin/bash might not exist (Kaniko is very minimal), but /busybox/sh always does.

    Auth Domain Cleanup: I added a small sed command to ensure that if you accidentally put https:// in your REGISTRY variable, it gets stripped out for the Docker config file, as registries usually want just the hostname.

A Note on Forgejo Settings

If you still get a "Push Permission" error after the casing is fixed:

    Go to your Repository Settings -> Packages.

    Ensure that the Container Registry is enabled.

    By default, the GITHUB_TOKEN has write access to its own repo's packages, but if this is an Organization repo, check if there are "protected" package settings.

