name: Build and Push with Buildah (Restricted)

on:
  push:
    branches: [main]

env:
  REGISTRY: forge.example.com
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and Push
        uses: docker://quay.io/buildah/stable:latest
        env:
          BUILDAH_ISOLATION: chroot
          STORAGE_DRIVER: vfs
        with:
          entrypoint: /bin/sh
          args: |
            -c "
            # Lowercase the image name
            LOWER_IMAGE=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')
            
            # Login
            buildah login --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
            
            # Build using specific flags to bypass namespace checks
            # --no-pivot is often required in restricted CI environments
            buildah build \
              --storage-driver vfs \
              --isolation chroot \
              --format docker \
              --no-pivot \
              -t ${{ env.REGISTRY }}/$LOWER_IMAGE:latest .
            
            # Push
            buildah push --storage-driver vfs ${{ env.REGISTRY }}/$LOWER_IMAGE:latest
            "
