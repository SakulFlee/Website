Note, that we are on Forgejo, not GitHub

The "Dockerfile path" error is a classic Kaniko quirk. When you use docker:// actions, Forgejo (via act_runner) mounts your code into a specific directory inside the container—usually /github/workspace.

If you provide an absolute path for the Dockerfile that Kaniko doesn't think is "inside" the context, it throws that error. The fix is to set the context and then use a relative path for the Dockerfile.

Here is the "No more errors" version of the pipeline.
The Guaranteed Forgejo Kaniko Pipeline
YAML

name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  # ⚠️ Set your actual Forgejo domain here
  REGISTRY: forge.example.com 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Image Name and Auth
        run: |
          # 1. Lowercase the image name (SakulFlee/my-app -> sakulflee/my-app)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$REPO_LOWER" >> $GITHUB_ENV
          
          # 2. Create Docker auth in the workspace
          mkdir -p ${{ github.workspace }}/.docker
          REG_HOST=$(echo "${{ env.REGISTRY }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)
          echo "{\"auths\":{\"$REG_HOST\":{\"auth\":\"$AUTH\"}}}" > ${{ github.workspace }}/.docker/config.json

      - name: Build and Push with Kaniko
        uses: docker://gcr.io/kaniko-project/executor:debug
        with:
          # We use the built-in workspace variable for the context.
          # We omit the path from --dockerfile so Kaniko looks at the context root.
          args: >-
            --context=${{ github.workspace }}
            --dockerfile=Dockerfile
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            --force
        env:
          # This tells Kaniko where the config.json is located inside the container
          DOCKER_CONFIG: ${{ github.workspace }}/.docker
