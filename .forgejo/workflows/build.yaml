name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Image Name and Auth
        shell: /busybox/sh # Kaniko uses busybox
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$REPO_LOWER" >> $GITHUB_ENV
          
          mkdir -p /kaniko/.docker
          REGISTRY_DOMAIN=$(echo "${{ env.REGISTRY }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)
          echo "{\"auths\":{\"$REGISTRY_DOMAIN\":{\"auth\":\"$AUTH\"}}}" > /kaniko/.docker/config.json

      - name: Build and Push
        run: |
          /kaniko/executor \
            --context "${{ github.workspace }}" \
            --dockerfile "${{ github.workspace }}/Dockerfile" \
            --destination "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            --force
